baseURL = 'https://www.tianpai.io/'
title = "Tianpai Blog"
defaultContentLanguage = 'en'

[languages]
  [languages.en]
    languageCode = 'en-us'
    languageName = 'English'
    weight = 1
    [languages.en.params]
      author = 'Tianpai Z'
      copyright = 'Copyright © 2026, Tianpai Z'
  [languages.zh]
    languageCode = 'zh'
    languageName = '中文'
    weight = 2
    [languages.zh.params]
      author = 'Tianpai Z'
      copyright = 'Copyright © 2026'

enableRobotsTXT = true
# Bearblog keeps URLs simple by skipping taxonomy pages entirely.
disableKinds = ['taxonomy']
ignoreErrors = ['error-disable-taxonomy']

[permalinks]
  blog = '/:slug/'
  tags = '/blog/:slug'

[params]
  description = 'Blog.'
  favicon = 'images/favicon.png'
  images = ['images/share.png']
  title = "Tianpai's Blog"
  enablePostNavigator = true

[markup]
  [markup.highlight]
    style = 'friendly'
    noClasses = false
    lineNos = true
    lineNumbersInTable = false
    codeFences = true
