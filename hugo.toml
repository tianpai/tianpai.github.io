baseURL = 'https://www.tianpai.io/'
title = "Tianpai Blog"
theme = 'bearIM'
defaultContentLanguage = 'en'

[languages]
  [languages.en]
    languageCode = 'en-us'
    languageName = 'English'
    weight = 1
    [languages.en.params]
      author = 'Tianpai Z'
      copyright = 'Copyright © 2025, Tianpai Z'

enableRobotsTXT = true
# Bearblog keeps URLs simple by skipping taxonomy pages entirely.
disableKinds = ['taxonomy']
ignoreErrors = ['error-disable-taxonomy']

[permalinks]
  blog = '/:slug/'
  tags = '/blog/:slug'

[params]
  description = 'Experiments with Hugo Bear Blog.'
  favicon = 'images/favicon.png'
  images = ['images/share.png']
  title = "Tianpai's Blog"
  enablePostNavigator = true

[markup]
  [markup.highlight]
    style = 'friendly'
    lineNos = true
    lineNumbersInTable = false
    codeFences = true
