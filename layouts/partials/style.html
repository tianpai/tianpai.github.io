    --text-color: #444;

    --code-bg: #f5ebe0;
    --selection-bg: #e3c5a6;
    --border-color: #999;
    --highlight-bg: #f5ebe0;
  }

    :root:not([data-theme="light"]) {
      --background-color: #1a1510;
      --heading-color: #e8d5c0;
      --text-color: #c4b5a3;

      --selection-bg: #4a3828;
      --border-color: #5a4a38;
      --highlight-bg: #2a2218;
    }
  }

  [data-theme="dark"] {
    --background-color: #1a1510;
    --heading-color: #e8d5c0;
    --text-color: #c4b5a3;
    --link-color: #c4b5a3;
    --visited-color: #c4b5a3;

    --selection-bg: #4a3828;
    --border-color: #5a4a38;
    --highlight-bg: #2a2218;
  }

  [data-theme="light"] {
    --background-color: #efdecd;
    --heading-color: #272011;
    --text-color: #444;
    --link-color: #444;
    --visited-color: #444;
    --blockquote-color: #222;
    --code-bg: #f5ebe0;
    --selection-bg: #e3c5a6;
    --border-color: #999;
    --highlight-bg: #f5ebe0;
  }

  body {
    font-family: var(--font-secondary);
    font-size: var(--font-scale);
    margin: auto;
    padding: 30px;
    max-width: var(--width);
    text-align: left;
    background-color: var(--background-color);
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.5;
    color: var(--text-color);
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: var(--font-main);
    color: var(--heading-color);
  }

  a {
    color: var(--link-color);
    cursor: pointer;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  nav a {
    margin-right: 0px;
  }

  nav {
    margin-bottom: 1rem;
  }

  strong,
  b {
    color: var(--heading-color);
  }

  button {
    margin: 0;
    cursor: pointer;
  }

  time {
    font-family: var(--font-main);
    font-style: normal;
    font-size: 1em;
  }

  main {
    line-height: 1.6;
  }

  content {
    display: block;
    font-family: var(--font-secondary);
    font-size: inherit;
  }

  p {
    text-align: justify;
  }

  content p {
    text-align: justify;
  }

  table {
    width: 100%;
  }

  hr {
    border: 0;
    border-top: 1px dashed;
  }

  img {
    max-width: 80%;
  }

  code {
    font-family: monospace;
    padding: 2px;
    border-radius: 3px;
    background-color: var(--code-bg);
  }

  blockquote {
    border-left: 1px solid var(--border-color);
    color: var(--blockquote-color);
    padding-left: 20px;
    font-style: italic;
  }

  footer {
    padding: 5px 0;
    text-align: center;
  }

  .title:hover {
    text-decoration: none;
  }

  .title h1 {
    font-size: 1.5em;
  }

  .inline {
    width: auto !important;
  }

  .highlight,
  .code {
    border-radius: 3px;
    margin-block-start: 1em;
    margin-block-end: 1em;
    overflow-x: auto;
    background-color: var(--code-bg);
    padding: 1rem;
  }

  pre {
    background-color: var(--highlight-bg) !important;
    padding: 1rem;
    border-radius: 3px;
  }

  .highlight pre {
    background-color: var(--highlight-bg) !important;
  }

  pre code {
    background-color: transparent;
    padding: 0;
  }

  /* blog post list */
  ul.blog-posts {
    list-style-type: none;
    padding: unset;
  }

  ul.blog-posts li {
    display: flex;
  }

  ul.blog-posts li span {
    flex: 0 0 130px;
  }

  ul.blog-posts li a:visited {
    color: var(--visited-color);
  }

  .projects {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    margin-top: 0.5rem;
  }

  .project-card {
    background-color: transparent;
    border-radius: 0;
    padding: 1.5rem;
    box-shadow: none;
  }

  .project-card__header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 2px dashed var(--text-color);
    gap: 1rem;
  }

  .project-card__links a {
    margin-left: 10px;
    text-decoration: none;
    font-size: 0.95em;
  }

  .project-card__stack {
    margin-top: 0.75rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .project-card__stack span {
    background-color: var(--code-bg);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 0.85em;
  }

  .site-footer {
    font-size: 0.9em;
    margin-top: 3rem;
    padding-top: 1rem;
  }

  .site-footer a {
    text-decoration: none;
  }

  .blog-container {
    position: relative;
  }

  .table-of-contents {
    display: none;
    position: fixed;
    top: 20px;
    left: calc(78% + 2rem);
    width: 480px;
    padding: 1rem;
    font-size: 0.7em;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
    border-left: 2px solid var(--border-color);
  }

  .table-of-contents h2 {
    margin-top: 0;
    font-size: 1.1em;
  }

  .table-of-contents ul {
    margin: 0.5rem 0 0 0;
    padding-left: 1.5rem;
  }

  .table-of-contents li {
    margin: 0.3rem 0;
  }

  .table-of-contents a {
    text-decoration: none;
  }

  .table-of-contents a:hover {
    text-decoration: underline;
  }

  @media (max-width: 1400px) {
    .table-of-contents {
      position: static;
      width: 100%;
      margin: 2rem 0;
      max-height: none;
    }
  }

  /* Theme toggle button */
  .theme-toggle {
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 1.1em;
    padding: 4px;
    color: var(--text-color);
    vertical-align: middle;
  }

  .theme-toggle:hover {
    opacity: 0.7;
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
